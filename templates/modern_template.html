<!DOCTYPE html>
<html>
<head>
    <title>Modern Resume</title>
</head>
<body style="background:#f4f4f4;font-family:Arial;">

<div style="width:80%;margin:auto;background:white;padding:30px;">

    <h1>{{ resume[1] }}</h1>

    <p>Email: {{ resume[2] }}</p>
    <p>Phone: {{ resume[3] }}</p>

    <hr>

    <h2>Education</h2>
    <p>{{ resume[5] }}</p>

    <h2>Skills</h2>
    <p>{{ resume[6] }}</p>

    <h2>Projects</h2>
    <p>{{ resume[7] }}</p>

</div>

</body>
</html>
